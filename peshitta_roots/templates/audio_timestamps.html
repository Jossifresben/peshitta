<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audio Timestamp Tool — {{ book }} {{ chapter }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #faf9f6; color: #333; padding: 20px; max-width: 900px; margin: 0 auto; }
        h1 { font-size: 1.4em; margin-bottom: 16px; color: #6b7a5e; }
        .nav { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
        .nav select, .nav button { padding: 6px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.9em; }
        .nav button { background: #6b7a5e; color: #fff; border: none; cursor: pointer; }

        .player-bar { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-bottom: 20px; position: sticky; top: 10px; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .player-controls { display: flex; align-items: center; gap: 12px; }
        .play-btn { width: 44px; height: 44px; border-radius: 50%; background: #6b7a5e; color: #fff; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .progress-wrap { flex: 1; height: 8px; background: #e0e0e0; border-radius: 4px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: #6b7a5e; border-radius: 4px; width: 0%; pointer-events: none; }
        .progress-thumb { position: absolute; top: 50%; width: 18px; height: 18px; background: #6b7a5e; border: 2px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); left: 0%; cursor: grab; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
        .progress-thumb:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.2); }
        .time-display { font-family: monospace; font-size: 1.1em; min-width: 60px; text-align: center; font-weight: 600; color: #6b7a5e; }
        .speed-select { padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85em; }

        .verse-list { display: flex; flex-direction: column; gap: 4px; }
        .verse-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #fff; border: 1px solid #eee; border-radius: 8px; transition: background 0.2s; }
        .verse-row.marked { background: #f0f4ec; border-color: #6b7a5e; }
        .verse-row.active { background: #e8eddf; }
        .verse-num { font-weight: 700; color: #6b7a5e; min-width: 30px; }
        .verse-text { flex: 1; min-width: 0; }
        .verse-syriac { font-size: 1.1em; direction: rtl; font-family: 'Estrangelo Edessa', 'Noto Sans Syriac', serif; }
        .verse-translit { font-size: 0.8em; color: #888; margin-top: 2px; }
        .mark-btn { padding: 6px 16px; background: #b8860b; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; white-space: nowrap; }
        .mark-btn:hover { background: #996f09; }
        .mark-btn.done { background: #6b7a5e; }
        .timestamp-val { font-family: monospace; font-size: 0.9em; color: #6b7a5e; min-width: 50px; text-align: center; }
        .ts-input { width: 65px; font-family: monospace; font-size: 0.9em; padding: 3px 6px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }

        .export-bar { margin-top: 20px; display: flex; gap: 10px; }
        .export-btn { padding: 10px 24px; background: #6b7a5e; color: #fff; border: none; border-radius: 8px; font-size: 1em; cursor: pointer; font-weight: 600; }
        .export-btn:disabled { background: #ccc; cursor: not-allowed; }
        .status { margin-top: 10px; font-size: 0.9em; color: #888; }
    </style>
</head>
<body>
    <h1>Audio Timestamp Tool</h1>

    <div class="nav">
        <select id="book-select">
            {% for b_name, b_max in books %}
            <option value="{{ b_name }}" data-chapters="{{ b_max }}" {% if b_name == book %}selected{% endif %}>{{ b_name }}</option>
            {% endfor %}
        </select>
        <select id="chapter-select">
            {% for ch in range(1, max_chapter + 1) %}
            <option value="{{ ch }}" {% if ch == chapter %}selected{% endif %}>{{ ch }}</option>
            {% endfor %}
        </select>
        <button onclick="navigate()">Go</button>
    </div>

    <div class="player-bar">
        <div class="player-controls">
            <button class="play-btn" id="play-btn" title="Play / Pause">&#9654;</button>
            <div class="progress-wrap" id="progress-wrap">
                <div class="progress-fill" id="progress-fill"></div>
                <div class="progress-thumb" id="progress-thumb"></div>
            </div>
            <span class="time-display" id="time-display">0:00</span>
            <select class="speed-select" id="speed-select">
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
            </select>
        </div>
    </div>

    <div class="verse-list" id="verse-list">
        {% for v in verses %}
        <div class="verse-row" data-verse="{{ v.number }}">
            <span class="verse-num">{{ v.number }}</span>
            <div class="verse-text">
                <div class="verse-syriac">{{ v.syriac }}</div>
                <div class="verse-translit">{{ v.translit_he }}</div>
                <div class="verse-translit" style="color:#666; font-style:italic;">{{ v.translit_la }}</div>
            </div>
            <input type="text" class="ts-input" id="ts-{{ v.number }}" placeholder="—" readonly>
            <button class="mark-btn" onclick="markVerse({{ v.number }})">Mark</button>
        </div>
        {% endfor %}
    </div>

    <div class="export-bar">
        <button class="export-btn" id="export-btn" onclick="exportJSON()">Download JSON</button>
        <button class="export-btn" style="background:#b8860b;" onclick="clearAll()">Clear All</button>
    </div>
    <div class="status" id="status">Mark each verse's start time while listening. Tip: use 0.75x speed.</div>

    <script>
    var audio = new Audio("{{ url_for('static', filename=audio_file) }}");
    audio.preload = 'auto';
    var timestamps = {};
    var totalVerses = {{ verses|length }};
    var book = "{{ book }}";
    var chapter = {{ chapter }};

    // Player controls
    var playBtn = document.getElementById('play-btn');
    var progressWrap = document.getElementById('progress-wrap');
    var progressFill = document.getElementById('progress-fill');
    var timeDisplay = document.getElementById('time-display');
    var speedSelect = document.getElementById('speed-select');

    function fmt(s) {
        var m = Math.floor(s / 60);
        var sec = Math.floor(s % 60);
        var ms = Math.floor((s % 1) * 10);
        return m + ':' + (sec < 10 ? '0' : '') + sec + '.' + ms;
    }

    playBtn.addEventListener('click', function() {
        if (audio.paused) { audio.play(); playBtn.innerHTML = '&#9646;&#9646;'; }
        else { audio.pause(); playBtn.innerHTML = '&#9654;'; }
    });

    var thumb = document.getElementById('progress-thumb');
    var dragging = false;

    function seekTo(e) {
        var rect = progressWrap.getBoundingClientRect();
        var pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        audio.currentTime = pct * (audio.duration || 0);
    }

    thumb.addEventListener('mousedown', function(e) { dragging = true; e.preventDefault(); });
    document.addEventListener('mousemove', function(e) { if (dragging) seekTo(e); });
    document.addEventListener('mouseup', function() { dragging = false; });
    thumb.addEventListener('touchstart', function(e) { dragging = true; }, { passive: true });
    document.addEventListener('touchmove', function(e) { if (dragging) seekTo(e.touches[0]); });
    document.addEventListener('touchend', function() { dragging = false; });

    audio.addEventListener('timeupdate', function() {
        var t = audio.currentTime;
        var d = audio.duration || 1;
        var pct = (t / d * 100);
        progressFill.style.width = pct + '%';
        thumb.style.left = pct + '%';
        timeDisplay.textContent = fmt(t);

        // Highlight active verse row
        var activeV = null;
        var sorted = Object.keys(timestamps).map(Number).sort(function(a,b){return a-b;});
        for (var i = sorted.length - 1; i >= 0; i--) {
            if (t >= timestamps[sorted[i]]) { activeV = sorted[i]; break; }
        }
        document.querySelectorAll('.verse-row').forEach(function(row) {
            row.classList.toggle('active', parseInt(row.dataset.verse) === activeV);
        });
    });

    progressWrap.addEventListener('click', function(e) {
        var rect = progressWrap.getBoundingClientRect();
        var pct = (e.clientX - rect.left) / rect.width;
        audio.currentTime = pct * (audio.duration || 0);
    });

    speedSelect.addEventListener('change', function() {
        audio.playbackRate = parseFloat(this.value);
    });

    // Keyboard: space = play/pause, m = mark next unmarked verse
    document.addEventListener('keydown', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        if (e.code === 'Space') {
            e.preventDefault();
            playBtn.click();
        }
        if (e.code === 'KeyM') {
            // Find next unmarked verse
            for (var i = 1; i <= totalVerses; i++) {
                if (!(i in timestamps)) { markVerse(i); break; }
            }
        }
        // Arrow left/right: seek 2s
        if (e.code === 'ArrowLeft') { audio.currentTime = Math.max(0, audio.currentTime - 2); }
        if (e.code === 'ArrowRight') { audio.currentTime = Math.min(audio.duration, audio.currentTime + 2); }
    });

    function markVerse(num) {
        var t = audio.currentTime;
        timestamps[num] = Math.round(t * 10) / 10;
        var input = document.getElementById('ts-' + num);
        input.value = fmt(t);
        input.removeAttribute('readonly');
        input.addEventListener('change', function() {
            // Parse manual edit: M:SS.d
            var parts = this.value.split(':');
            if (parts.length === 2) {
                var newT = parseInt(parts[0]) * 60 + parseFloat(parts[1]);
                if (!isNaN(newT)) timestamps[num] = Math.round(newT * 10) / 10;
            }
        });

        var row = document.querySelector('.verse-row[data-verse="' + num + '"]');
        if (row) row.classList.add('marked');
        var btn = row.querySelector('.mark-btn');
        if (btn) { btn.classList.add('done'); btn.textContent = fmt(t); }

        var marked = Object.keys(timestamps).length;
        document.getElementById('status').textContent = marked + ' / ' + totalVerses + ' verses marked.  Shortcuts: Space=play/pause, M=mark next, arrows=seek 2s';
    }

    function clearAll() {
        timestamps = {};
        document.querySelectorAll('.ts-input').forEach(function(inp) { inp.value = ''; inp.setAttribute('readonly', ''); });
        document.querySelectorAll('.verse-row').forEach(function(row) { row.classList.remove('marked', 'active'); });
        document.querySelectorAll('.mark-btn').forEach(function(btn) { btn.classList.remove('done'); btn.textContent = 'Mark'; });
        document.getElementById('status').textContent = 'Cleared. Start marking again.';
    }

    function exportJSON() {
        var sorted = Object.keys(timestamps).map(Number).sort(function(a,b){return a-b;});
        if (sorted.length === 0) { alert('No timestamps marked yet.'); return; }

        var duration = audio.duration || 0;
        var verses = {};
        for (var i = 0; i < sorted.length; i++) {
            var vNum = sorted[i];
            var start = timestamps[vNum];
            var end = (i + 1 < sorted.length) ? timestamps[sorted[i + 1]] : Math.round(duration * 10) / 10;
            verses[String(vNum)] = { start: start, end: end };
        }

        var data = {};
        data[String(chapter)] = {
            file: book + '/' + chapter + '.mp3',
            duration: Math.round(duration * 10) / 10,
            verses: verses
        };

        var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = book + '_ch' + chapter + '_timestamps.json';
        a.click();
        URL.revokeObjectURL(url);
        document.getElementById('status').textContent = 'Exported! Save to data/audio_timestamps/' + book + '.json';
    }

    function navigate() {
        var b = document.getElementById('book-select').value;
        var c = document.getElementById('chapter-select').value;
        window.location.href = '/audio-timestamps?book=' + encodeURIComponent(b) + '&chapter=' + c;
    }

    document.getElementById('book-select').addEventListener('change', function() {
        var opt = this.options[this.selectedIndex];
        var maxCh = parseInt(opt.getAttribute('data-chapters')) || 1;
        var chSel = document.getElementById('chapter-select');
        chSel.innerHTML = '';
        for (var i = 1; i <= maxCh; i++) {
            var o = document.createElement('option');
            o.value = i; o.textContent = i;
            chSel.appendChild(o);
        }
    });
    </script>
</body>
</html>
